name: Update Lift Gist
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch all sheets
        run: |
          SHEET_ID="1qvjdiXpBBo8TF3qTc3YWtQ0w2amZoTVSoKPU4yftbgQ"
          curl -s "https://docs.google.com/spreadsheets/d/$SHEET_ID/export?format=csv&gid=0" > Monday.csv
          curl -s "https://docs.google.com/spreadsheets/d/$SHEET_ID/export?format=csv&gid=1417004612" > Tuesday.csv
          curl -s "https://docs.google.com/spreadsheets/d/$SHEET_ID/export?format=csv&gid=594739764" > Wednesday.csv
          curl -s "https://docs.google.com/spreadsheets/d/$SHEET_ID/export?format=csv&gid=1704932052" > Thursday.csv
          cat Monday.csv Tuesday.csv Wednesday.csv Thursday.csv > lift-data.json
      
      - name: Update gist
        run: |
          CONTENT=$(cat lift-data.json)
          curl -X PATCH https://api.github.com/gists/252ee74cda4f78e4cd25f16790abb46a \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << EOF
          {
            "files": {
              "lift-data.txt": {
                "content": $(echo "$CONTENT" | jq -Rs '.')
              }
            }
          }
          EOF
