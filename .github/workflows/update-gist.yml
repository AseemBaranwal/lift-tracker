name: Update Lift Gist
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and update gist
        run: |
          curl -s 'https://script.google.com/macros/s/AKfycbzq_BoRvRwzO0anf0wes7kmSdbcXgI5kDpmQ9e6dafD3--bSwQF6z3fs1NTGn-R1Laq/exec' > lift-data.json
          
          curl -X PATCH https://api.github.com/gists/252ee74cda4f78e4cd25f16790abb46a \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -d "{\"files\": {\"lift-data.json\": {\"content\": \"$(cat lift-data.json | sed 's/"/\\\\"/g')\"}}" || true
